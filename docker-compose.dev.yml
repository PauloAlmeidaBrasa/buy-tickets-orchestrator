services:
  buy-tickets-front:
    build:
      context: ./buy-ticket-front
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./buy-ticket-front:/app
      - buy-ticket-front-node-modules:/app/node_modules

  buy-ticket-api:
    build:
      context: ./buy-ticket-api
      dockerfile: Dockerfile.dev
      target: dev
    env_file:
      - ./buy-ticket-api/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8082'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "8082:8082"
    volumes:
      - ./buy-ticket-api:/app
      - /root/.m2:/root/.m2

  ticket-consumer:
    build:
      context: ./buy-ticket-consumer
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
      buy-ticket-api:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/buy_tickets
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_DATASOURCE_USERNAME: buy_tickets
      SPRING_DATASOURCE_PASSWORD: buy_tickets_pwd
    volumes:
      - ./buy-ticket-consumer:/app
      - /root/.m2:/root/.m2

volumes:
  buy-ticket-front-node-modules:
